name: Verify & Deploy (verify)

on:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install pillow pytest
      - name: Run image checker
        run: python scripts/check_images.py
      - name: Run python tests
        run: pytest -q || true

# Deploy job to be added after review — не пушить автодеплой без согласования
