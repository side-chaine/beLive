name: Migrate to Vite + PWA

on:
  workflow_dispatch:

permissions:
  contents: write    # ← это главное, теперь может пушить
  pull-requests: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Migrate structure & add Vite files
        run: |
          # Создаём структуру
          mkdir -p src/css src/js src/img src/Karaoke src/Rehearsal src/Concert src/Live src/assets src/backend src/gateway src/resources src/logs src/Docs src/json src/"Reference Code"
          mkdir -p public

          # Копируем всё из старых папок
          cp -r css/* src/css/ 2>/dev/null || true
          cp -r js/* src/js/ 2>/dev/null || true
          cp -r img/* src/img/ 2>/dev/null || true
          cp -r Karaoke/* src/Karaoke/ 2>/dev/null || true
          cp -r Rehearsal/* src/Rehearsal/ 2>/dev/null || true
          cp -r Concert/* src/Concert/ 2>/dev/null || true
          cp -r Live/* src/Live/ 2>/dev/null || true
          cp -r assets/* src/assets/ 2>/dev/null || true
          cp -r backend/* src/backend/ 2>/dev/null || true
          cp -r gateway/* src/gateway/ 2>/dev/null || true
          cp -r resources/* src/resources/ 2>/dev/null || true
          cp -r logs/* src/logs/ 2>/dev/null || true
          cp -r Docs/* src/Docs/ 2>/dev/null || true
          cp -r json/* src/json/ 2>/dev/null || true
          cp -r "Reference Code"/* src/"Reference Code"/ 2>/dev/null || true
          [ -f index.html ] && cp index.html src/index.html

          # Удаляем старые папки
          rm -rf css js img Karaoke Rehearsal Concert Live assets backend gateway resources logs Docs json "Reference Code" index.html

          # package.json + vite.config.ts + manifest + deploy (всё как надо)
          cat > package.json << 'EOF'
{
  "name": "belive",
  "version": "1.0.0",
  "type": "module",
  "private": true,
  "scripts": {
    "dev": "vite",
    "build": "vite build",
    "preview": "vite preview"
  },
  "devDependencies": {
    "vite": "^5.4.8",
    "vite-plugin-pwa": "^0.20.5"
  }
}
EOF

          cat > vite.config.ts << 'EOF'
import { defineConfig } from 'vite'
import { VitePWA } from 'vite-plugin-pwa'

export default defineConfig({
  base: '/beLive/',
  root: 'src',
  publicDir: '../public',
  build: { outDir: '../dist', emptyOutDir: true },
  plugins: [VitePWA({
    registerType: 'autoUpdate',
    manifest: {
      name: 'beLive',
      short_name: 'beLive',
      start_url: '/beLive/',
      display: 'standalone',
      background_color: '#000000',
      theme_color: '#6366f1',
      icons: [
        { src: '/beLive/img/icon-192.png', sizes: '192x192', type: 'image/png' },
        { src: '/beLive/img/icon-512.png', sizes: '512x512', type: 'image/png' }
      ]
    }
  })]
})
EOF

          mkdir -p public && cat > public/manifest.json << 'EOF'
{
  "name": "beLive",
  "short_name": "beLive",
  "start_url": "/beLive/",
  "display": "standalone",
  "background_color": "#000000",
  "theme_color": "#6366f1",
  "icons": [
    { "src": "img/icon-192.png", "sizes": "192x192", "type": "image/png" },
    { "src": "img/icon- 512.png", "sizes": "512x512", "type": "image/png" }
  ]
}
EOF

          # простой main.js чтобы не было ошибок
          cat > src/main.js << 'EOF'
import './css/style.css'
console.log('beLive + Vite + PWA ready!')
EOF

      - name: Commit & push
        run: |
          git config user.name "beLive Bot"
          git config user.email "bot@belive.app"
          git add .
          git commit -m "feat: full migration to Vite + PWA" || echo "nothing to commit"
          git push origin main || echo "push failed (ok if already up to date)"

      - name: Done
        run: echo "Готово! Всё перенесено и настроено"