name: Deploy to GitHub Pages

on: 
  push:
    branches:
      - main
      - gh-pages
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build project (placeholder)
        run: echo "Building project... (replace with actual build commands)"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          # If your project builds to a specific directory (e.g., `dist`), change `publish_dir` accordingly
          # publish_branch: gh-pages # Uncomment to deploy to gh-pages branch instead of main/master
