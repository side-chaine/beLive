<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>beLive — Phone Connect</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; text-align: center; background: #111; color: #eee; }
    input, button { width: 100%; padding: 14px; margin: 8px 0; font-size: 16px; box-sizing: border-box; border-radius: 8px; }
    input { background: #222; border: 1px solid #444; color: #eee; text-align: center; }
    button { background: #00a86b; color: white; border: none; cursor: pointer; font-weight: bold; }
    .btn-big { padding: 18px; font-size: 18px; }
    h2 { color: #0f0; }
    .hint { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <h2>🎵 beLive — Student</h2>
  <p class="hint">1. Открой эту страницу на телефоне</p>
  <p class="hint">2. Дождись загрузки трека</p>
  <p class="hint">3. Вернись сюда и нажми "Подключиться"</p>
  
  <input type="text" id="roomInput" placeholder="Room ID с ноута">
  
  <button class="btn-big" onclick="connect()">🔗 Подключиться к сессии</button>
  
  <div id="step2" style="display:none; margin-top: 20px; padding: 15px; background: #1a3a1a; border-radius: 8px;">
    <p style="color:#0f0; font-size: 18px;">✅ Готово!</p>
    <p class="hint">Ты подключён как Student. Teacher (ноут) управляет воспроизведением.</p>
  </div>

  <script>
    async function connect() {
      const room = document.getElementById('roomInput').value.trim();
      if (!room) { alert('Введи Room ID с ноута!'); return; }
      document.getElementById('step2').style.display = 'block';
      // Редирект с ?phone=1 — main.tsx подхватит и подключится
      window.location.href = 'https://app.mybelive.com/?phone=1&room=' + room;
    }

    // Если room уже в URL — подставляем
    const urlRoom = new URLSearchParams(location.search).get('room');
    if (urlRoom) {
      document.getElementById('roomInput').value = urlRoom;
    }
  </script>
</body>
</html>
